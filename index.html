<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Are You Pro-AI or Anti-AI?</title>
<style>
        /* 1. Global Reset & Clean Modern Font */
        * {
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #111416; /* Deep dark background for rich contrast */
            color: #ffffff;
            overflow-x: hidden; 
        }

        /* 2. Main Layout Container */
        .voting-container {
            display: flex;
            flex-direction: row;
            height: 100vh;
            align-items: stretch;
        }

        /* 3. Side Columns Shared Styling */
        .pro-side, .anti-side {
            flex: 1; 
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;     
            padding: 60px 40px;
            transition: all 0.3s ease; 
        }

        /* Strong, solid color gradients that stay rich edge-to-edge */
        .pro-side {
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
        }

        .anti-side {
            background: linear-gradient(135deg, #b71c1c 0%, #c62828 100%);
        }

        /* Typography Polish */
        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            margin-bottom: 10px;
            letter-spacing: -0.5px;
            color: #ffffff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        p {
            font-size: 1.4rem;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.9);
            margin-top: 0;
            text-shadow: 0 1px 2px rgba(0,0,0,0.2);
        }

        /* 4. Center Total Box Styling (Dark Premium Glass look) */
        .total-box {
            display: flex;
            flex-direction: column;
            justify-content: center; 
            align-items: center;
            padding: 40px;
            background-color: #1a1d20;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5); 
            z-index: 10; 
            min-width: 260px;
            text-align: center;
            border-left: 1px solid #2a2e33;
            border-right: 1px solid #2a2e33;
        }

        .total-box h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #8a949f;
            margin-bottom: 15px;
            text-shadow: none;
        }

        #total-display {
            font-size: 4.5rem;
            font-weight: 900;
            color: #ffffff;
            margin: 0;
            line-height: 1;
        }

        /* 5. Buttons Styling (Bright contrast against dark backgrounds) */
        button {
            padding: 16px 36px;
            font-size: 1.05rem;
            font-weight: 700;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            margin-top: 30px;
            background-color: #ffffff;
            color: #111416;
            transition: all 0.2s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 14px 28px rgba(0,0,0,0.35);
            background-color: #f1f3f5;
        }

        button:active {
            transform: translateY(1px);
        }

        /* ==========================================================================
           6. RESPONSIVE DESIGN (TABLETS & PHONES)
           ========================================================================== */
        @media (max-width: 900px) {
            body {
                overflow-y: auto; 
            }

            .voting-container {
                flex-direction: column; 
                height: auto; 
            }

            .pro-side {
                order: 2;
                padding: 60px 20px;
                border-bottom: 2px solid #111416;
            }

            .anti-side {
                order: 3;
                padding: 60px 20px;
            }

            .total-box {
                order: 1; 
                width: 100%;
                padding: 40px 20px;
                border-left: none;
                border-right: none;
                border-bottom: 2px solid #2a2e33;
            }

            h1 {
                font-size: 2.2rem;
            }
            #total-display {
                font-size: 3.5rem;
            }
        }
    </style>
</head>
<body>

    <div class="voting-container">

        <div class="pro-side">
            <h1>Pro-AI</h1>
            <p id="pro-display">0 Votes</p>
            <button onclick="votePro()">Vote Pro-AI</button>
        </div>

        <div class="total-box">
            <h1>Total Votes</h1>
            <p id="total-display">0</p>
        </div>
        
        <div class="anti-side">
            <h1>Anti-AI</h1>
            <p id="anti-display">0 Votes</p>
            <button onclick="voteAnti()">Vote Anti-AI</button>
        </div>
    
    </div>

    <script src="script.js"></script>
</body>
</html>
